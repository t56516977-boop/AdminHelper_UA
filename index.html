<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мій Discord Бот</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #23272a; color: white; text-align: center; margin: 0; padding: 0; }
        .container { padding: 50px; }
        h1 { color: #5865F2; font-size: 3rem; }
        p { font-size: 1.2rem; color: #b9bbbe; max-width: 600px; margin: 20px auto; }
        .btn { display: inline-block; padding: 15px 30px; background-color: #5865F2; color: white; text-decoration: none; border-radius: 8px; font-weight: bold; transition: 0.3s; margin: 10px; }
        .btn:hover { background-color: #4752c4; transform: scale(1.05); }
        .warning-box { background: rgba(255, 166, 0, 0.1); border: 1px solid orange; padding: 20px; border-radius: 10px; max-width: 600px; margin: 30px auto; color: #ffcc00; }
        footer { margin-top: 50px; color: #72767d; font-size: 0.9rem; }
    </style>
</head>
<body>

    <div class="container">
        <h1>Твій Бот</h1>
        <p>Найкращий помічник для вашого сервера з унікальними командами та швидким відгуком.</p>
        
        <div class="warning-box">
            <strong>⚠️ Увага:</strong> Додаючи бота, ви погоджуєтесь з тим, що власник має доступ до керування ботом на вашому сервері (перегляд та додавання команд).
        </div>

        <a href="ТВОЄ_ПОСИЛАННЯ_НА_ДОДАВАННЯ_БОТА" class="btn">Додати на сервер</a>
        <a href="https://discord.gg" class="btn" style="background-color: #4f545c;">Наш Discord</a>
    </div>

    <footer>© 2024 Всі права захищені</footer>

</body>
</html>
